<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kraken Bot Status</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Kraken Evolution Lab</h1>

    <div class="card">
      <h2>Current Task</h2>
      <p id="task1"></p>
      <p id="task2"></p>
    </div>

    <div class="card">
      <h2>Expected APR</h2>

    <div class="card">
      <h2>Testing Details</h2>
      <div id="details"></div>
    </div>

    <div class="footer">
      Last Updated: <span id="updated"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
